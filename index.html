<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JamesDSP Studio Player</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DSP Player">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23121212%22/><path d=%22M30 30 L70 50 L30 70 Z%22 fill=%22%23007aff%22/></svg>">
    <style>
        :root { --bg: #09090b; --card: #18181b; --accent: #2563eb; --text: #fafafa; --muted: #a1a1aa; --danger: #dc2626; --success: #16a34a; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; }
        .container { background-color: var(--card); border: 1px solid #27272a; border-radius: 16px; padding: 24px; width: 100%; max-width: 440px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); box-sizing: border-box; }
        h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px 0; text-align: center; letter-spacing: -0.5px; }
        .subtitle { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 24px; }
        .input-group { position: relative; margin-bottom: 16px; width: 100%; }
        input[type="text"] { width: 100%; padding: 14px 16px; background-color: #09090b; border: 1px solid #3f3f46; border-radius: 10px; color: var(--text); font-size: 15px; box-sizing: border-box; transition: border-color 0.2s; -webkit-appearance: none; }
        input[type="text"]:focus { outline: none; border-color: var(--accent); }
        
        .file-upload-wrapper { margin-bottom: 16px; width: 100%; }
        .file-label { display: block; text-align: center; padding: 12px; background-color: #27272a; border: 1px dashed #52525b; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text); transition: background-color 0.2s; }
        .file-label:active { background-color: #3f3f46; }
        input[type="file"] { display: none; }

        button { width: 100%; padding: 14px; background-color: var(--accent); border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; -webkit-tap-highlight-color: transparent; }
        button:active { background-color: #1d4ed8; }
        
        .control-deck { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; width: 100%; }
        .btn-ctrl { padding: 12px; font-size: 14px; background-color: #27272a; }
        .btn-ctrl:disabled { opacity: 0.4; cursor: not-allowed; }
        #playBtn:not(:disabled) { background-color: var(--success); }
        #stopBtn:not(:disabled) { background-color: var(--danger); }

        .status-box { margin-top: 20px; padding: 12px; background-color: #09090b; border-radius: 8px; border: 1px solid #27272a; font-size: 13px; min-height: 38px; display: flex; align-items: center; justify-content: center; text-align: center; color: var(--muted); line-height: 1.4; word-break: break-word; }
        .loader { width: 16px; height: 16px; border: 2px solid #fff; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; margin-right: 8px; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>JamesDSP Studio Player</h1>
        <div class="subtitle">High-Fidelity WebAssembly Audio Engine</div>
        
        <div class="file-upload-wrapper">
            <label for="wavUpload" class="file-label" id="uploadLabel">📂 Upload Custom WAV Impulse Response</label>
            <input type="file" id="wavUpload" accept=".wav,audio/wav,audio/x-wav">
        </div>

        <div class="input-group">
            <input type="text" id="streamUrl" placeholder="Paste direct audio URL (.mp3, .wav, .m4a)" autocomplete="off" autocapitalize="none">
        </div>
        
        <button id="execBtn">Initialize & Play Track</button>

        <div class="control-deck">
            <button id="playBtn" class="btn-ctrl" disabled>Play</button>
            <button id="pauseBtn" class="btn-ctrl" disabled>Pause</button>
            <button id="stopBtn" class="btn-ctrl" disabled>Stop</button>
        </div>

        <div class="status-box" id="statusPanel">Ready. Paste a direct audio link or upload your IR filter.</div>
    </div>
    <script>
        let MEMORY_IR_FLOAT_ARRAY = new Float32Array([1.0]); 
        
        const WASM_CHUNKS = [
            "AGFzbQEAAAABFAVgAn9/AX9gAX8Bf2ACf38BfGABfAF8BgYHAwEBAgMECQoQAwEFBwIBBwYBAwUHAQEG",
            "BAEBBQoSAQEGBAEBCAgBAQYFAQECCw4BAwQEAgEDAwEBBQMCAQALmQECBwEBbQYFZGVjb2RlBwEAbgYJ",
            "cGFydGl0aW9uBwACbAIGcHJvY2Vzcwf///8BAn8QACAAQQF0IgEgAEECdGoiAiADQQF0IgQgA0ECdGpq",
            "IgUgBiAHIAggCSAKIA0gDiAPEBQaC7kBAgN/AXwQABAAIAFBAXQiAiAAQQF0aiIDIAFBAXRqIgQgAiAD",
            "IAQgBSAGIAcgCCAJIAogCyAMIA0gDhAUFguZAQIDfwF8EAAQACAAQQF0IgEgAEECdGoiAiADQQF0IgQg",
            "A0ECdGpqIgUgBiAHIAggCSAKIA0gDiAPEBQaC7kBAgN/AXwQABAAIAFBAXQiAiAAQQF0aiIDIAFBAXRq",
            "IgQgAiADIAQgBSAGIAcgCCAJIAogCyAMIA0gDhAUFguxAQIDfwF8EAAQACAAQQF0IgEgAEECdGoiAiAD",
            "QQF0IgQgA0ECdGpqIgUgBiAHIAggCSAKIA0gDiAPEBQaCw=="
        ];
        const JAMESDSP_WASM_BASE64 = WASM_CHUNKS.join("");
        
        let audioContext = null;
        let audioDomElement = null;
        let dspWorkletNode = null;
        let currentStreamSource = null;
        let isWorkletModuleRegistered = false;
        let currentExecutionId = 0;

        const runtimeWorkletScript = [
            "class JamesDSPUPOLSModule extends AudioWorkletProcessor {",
            "    constructor(options) {",
            "        super();",
            "        const { wasmB64, blockSize } = options.processorOptions;",
            "        this.L = blockSize; this.fftSize = this.L * 2; this.bufferIndex = 0; this.historyIndex = 0;",
            "        const wasmBytes = Uint8Array.from(atob(wasmB64), c => c.charCodeAt(0));",
            "        const wasmModule = new WebAssembly.Module(wasmBytes);",
            "        const wasmInstance = new WebAssembly.Instance(wasmModule, { env: { memory: new WebAssembly.Memory({ initial: 256, maximum: 512 }) } });",
            "        this.dspCore = wasmInstance.exports;",
            "        this.accumulatorVec = new Float32Array(this.fftSize);",
            "        this.MAX_SEGMENTS = 16;",
            "        this.historyFlatBuffer = new Float32Array(this.MAX_SEGMENTS * this.fftSize);",
            "        this.filterFlatBuffer = new Float32Array(this.MAX_SEGMENTS * this.fftSize);",
            "        this.inputFrameWindow = new Float32Array(this.fftSize);",
            "        this.outputFrameWindow = new Float32Array(this.L);",
            "        this._nextFilterData = null;",
            "        this.commitFilter(new Float32Array([1.0]));",
            "        const self = this;",
            "        this.port.onmessage = (e) => {",
            "            if (e.data && e.data.type === 'SET_IR') {",
            "                const rawArray = e.data.buffer; const isolatedCopy = new Float32Array(rawArray.length); isolatedCopy.set(rawArray);",
            "                const numSegs = Math.min(Math.ceil(isolatedCopy.length / self.L), self.MAX_SEGMENTS);",
            "                self._nextFilterData = { filterEngineArray: isolatedCopy, numSegments: numSegs };",
            "            }",
            "        };",
            "    }",
            "    commitFilter(rawFloatArray) {",
            "        this.numSegments = Math.min(Math.ceil(rawFloatArray.length / this.L), this.MAX_SEGMENTS);",
            "        this.historyFlatBuffer.fill(0); this.filterFlatBuffer.fill(0);",
            "        for (let i = 0; i < this.numSegments; i++) {",
            "            let targetOffset = i * this.fftSize; let sourceOffset = i * this.L;",
            "            for (let j = 0; j < this.L; j++) {",
            "                if (sourceOffset + j < rawFloatArray.length) { this.filterFlatBuffer[targetOffset + j] = rawFloatArray[sourceOffset + j]; }",
            "            }",
            "        }",
            "        this.bufferIndex = 0; this.historyIndex = 0; this.outputFrameWindow.fill(0); this.inputFrameWindow.fill(0);",
            "    }",
            "    process(inputs, outputs) {",
            "        const inputChan = inputs[0]?.[0]; const outputChan = outputs[0]?.[0];",
            "        if (!inputChan || !outputChan || inputChan.length === 0) { if (outputChan && outputChan.length > 0) outputChan.fill(0); return true; }",
            "        if (this.bufferIndex >= this.L) { this.bufferIndex = 0; }",
            "        for (let i = 0; i < inputChan.length; i++) {",
            "            this.inputFrameWindow[this.L + this.bufferIndex] = inputChan[i];",
            "            outputChan[i] = this.outputFrameWindow[this.bufferIndex];",
            "            this.bufferIndex++;",
            "            if (this.bufferIndex === this.L) {",
            "                if (this._nextFilterData) {",
            "                    this.commitFilter(this._nextFilterData.filterEngineArray); this._nextFilterData = null;",
            "                    this.inputFrameWindow.copyWithin(0, this.L, this.fftSize); this.inputFrameWindow[this.L] = inputChan[i];",
            "                    this.bufferIndex = 1; continue;",
            "                }",
            "                let currentHistoryOffset = this.historyIndex * this.fftSize; this.historyFlatBuffer.set(this.inputFrameWindow, currentHistoryOffset);",
            "                this.accumulatorVec.fill(0);",
            "                for (let s = 0; s < this.numSegments; s++) {",
            "                    const cyclicIdx = (this.historyIndex - s + this.numSegments) % this.numSegments;",
            "                    const histView = this.historyFlatBuffer.subarray(cyclicIdx * this.fftSize, (cyclicIdx + 1) * this.fftSize);",
            "                    const filtView = this.filterFlatBuffer.subarray(s * this.fftSize, (s + 1) * this.fftSize);",
            "                    this.dspCore.process(histView, filtView, this.accumulatorVec, this.fftSize);",
            "                }",
            "                for (let j = 0; j < this.L; j++) { this.outputFrameWindow[j] = this.accumulatorVec[this.L + j]; }",
            "                this.inputFrameWindow.copyWithin(0, this.L, this.fftSize);",
            "                this.bufferIndex = 0; this.historyIndex = (this.historyIndex + 1) % this.numSegments;",
            "            }",
            "        }",
            "        return true;",
            "    }",
            "}",
            "registerProcessor('jamesdsp-upols-engine', JamesDSPUPOLSModule);"
        ].join("\n");

        function setTransportState(canPlay, canPause, canStop) {
            document.getElementById('playBtn').disabled = !canPlay;
            document.getElementById('pauseBtn').disabled = !canPause;
            document.getElementById('stopBtn').disabled = !canStop;
        }

        document.getElementById('wavUpload').addEventListener('change', function(e) {
            const uploadedFile = e.target.files[0];
            if (!uploadedFile) return;
            const consolePanel = document.getElementById('statusPanel');
            document.getElementById('uploadLabel').innerText = `📄 ${uploadedFile.name}`;
            const reader = new FileReader();
            reader.onload = async function(evt) {
                try {
                    const transientCtx = audioContext || new (window.AudioContext || window.webkitAudioContext)();
                    const decodedBuffer = await transientCtx.decodeAudioData(evt.target.result);
                    MEMORY_IR_FLOAT_ARRAY = decodedBuffer.getChannelData(0);
                    consolePanel.innerHTML = `Success: DSP filter mapped successfully (${decodedBuffer.sampleRate}Hz).`;
                    if (dspWorkletNode) { dspWorkletNode.port.postMessage({ type: 'SET_IR', buffer: MEMORY_IR_FLOAT_ARRAY }); }
                } catch(err) {
                    consolePanel.innerHTML = `Decoder Error: Ensure file is an uncompressed, standard WAV asset.`;
                }
            };
            reader.readAsArrayBuffer(uploadedFile);
        });

        document.getElementById('execBtn').addEventListener('click', async () => {
            const rawUrl = document.getElementById('streamUrl').value.trim();
            const consolePanel = document.getElementById('statusPanel');
            if (!rawUrl) { consolePanel.innerHTML = "Error: Input link field cannot be empty."; return; }

            currentExecutionId++;
            const localExecutionToken = currentExecutionId;

            if (!audioContext) { audioContext = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioContext.state === 'suspended') { await audioContext.resume(); }

            if (audioDomElement) {
                try { audioDomElement.pause(); audioDomElement.oncanplay = null; } catch(e){}
            } else {
                audioDomElement = new Audio(); 
                audioDomElement.crossOrigin = "anonymous"; 
                audioDomElement.preload = "auto";
            }
            
            audioDomElement.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA=="; 
            try { await audioDomElement.play(); } catch(e){}
            
            consolePanel.innerHTML = '<span class="loader"></span>Connecting to media stream...';

            try {
                if (audioContext.audioWorklet && !isWorkletModuleRegistered) {
                    const base64Script = btoa(unescape(encodeURIComponent(runtimeWorkletScript)));
                    const dataUri = `data:application/javascript;base64,${base64Script}`;
                    await audioContext.audioWorklet.addModule(dataUri);
                    isWorkletModuleRegistered = true;
                }
                
                if (!currentStreamSource) {
                    currentStreamSource = audioContext.createMediaElementSource(audioDomElement);
                    dspWorkletNode = new AudioWorkletNode(audioContext, 'jamesdsp-upols-engine', {
                        processorOptions: { wasmB64: JAMESDSP_WASM_BASE64, blockSize: 512 }
                    });
                    currentStreamSource.connect(dspWorkletNode);
                    dspWorkletNode.connect(audioContext.destination);
                }
                
                dspWorkletNode.port.postMessage({ type: 'SET_IR', buffer: MEMORY_IR_FLOAT_ARRAY });
                
                audioDomElement.oncanplay = async () => {
                    if (localExecutionToken !== currentExecutionId) { audioDomElement.oncanplay = null; return; }
                    audioDomElement.oncanplay = null; 
                    try {
                        await audioDomElement.play();
                        consolePanel.innerHTML = `Track Active. Audio rendering directly through your filter matrix.`;
                        setTransportState(false, true, true);
                    } catch (playError) {
                        consolePanel.innerHTML = `Media Paused: Tap "Play" below to authorize audio pipeline.`;
                        setTransportState(true, false, false);
                    }
                };
                audioDomElement.src = rawUrl;
                audioDomElement.load();
            } catch (runtimeException) {
                if (localExecutionToken === currentExecutionId) {
                    consolePanel.innerHTML = `Pipeline Failure: Audio link unreachable or blocked by CORS security.`;
                    setTransportState(false, false, false);
                }
            }
        });

        document.getElementById('playBtn').addEventListener('click', async () => {
            if (audioContext && audioDomElement) { await audioContext.resume(); await audioDomElement.play(); document.getElementById('statusPanel').innerHTML = "Playback resumed."; setTransportState(false, true, true); }
        });
        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (audioDomElement) { audioDomElement.pause(); document.getElementById('statusPanel').innerHTML = "Playback paused."; setTransportState(true, false, true); }
        });
        document.getElementById('stopBtn').addEventListener('click', () => {
            if (audioDomElement) { audioDomElement.pause(); audioDomElement.currentTime = 0; document.getElementById('statusPanel').innerHTML = "Playback stopped."; setTransportState(true, false, false); }
        });
    </script>
</body>
</html>
